<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SN 한/영 자동 변환 테스트</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 18px;
      background: #f3f4f6;
      color: #111827;
      font-family: "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
      font-size: 13px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 700;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 700;
    }

    .page {
      display: grid;
      gap: 14px;
      width: 100%;
      max-width: 1120px;
    }

    .comparison-grid,
    .barcode-layout {
      display: grid;
      grid-template-columns: repeat(2, minmax(280px, 1fr));
      gap: 12px;
      min-width: 0;
    }

    .panel {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #fff;
      padding: 14px;
      min-width: 0;
    }

    .serial-form {
      display: grid;
      grid-template-columns: max-content minmax(0, 1fr);
      gap: 10px 12px;
      align-items: center;
    }

    label {
      line-height: 28px;
      white-space: nowrap;
      min-width: 0;
    }

    input[type="text"] {
      width: 100%;
      min-width: 0;
      height: 30px;
      border: 1px solid #cfd4dc;
      background: #fff;
      padding: 4px 8px;
      font-size: 14px;
      text-transform: uppercase;
    }

    input[type="text"]:focus {
      border-color: #2563eb;
      outline: 2px solid rgba(37, 99, 235, 0.18);
    }

    .result-line {
      min-height: 22px;
      margin-top: 10px;
      color: #374151;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      word-break: break-all;
    }

    .barcode-box {
      overflow-x: auto;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      background: #fff;
      padding: 12px;
    }

    .barcode-image,
    .photo-barcode {
      display: block;
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      border-radius: 6px;
      background: #fff;
    }

    .ime-status {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #f9fafb;
      padding: 7px 12px;
      color: #374151;
      font-weight: 700;
    }

    .ime-status.korean {
      border-color: #f59e0b;
      background: #fffbeb;
      color: #92400e;
    }

    .ime-status.english {
      border-color: #2563eb;
      background: #eff6ff;
      color: #1d4ed8;
    }

    @media (max-width: 760px) {
      body { padding: 12px; }
      .comparison-grid,
      .barcode-layout { grid-template-columns: 1fr; }
      .serial-form {
        grid-template-columns: 1fr;
        gap: 4px;
      }
      .panel { padding: 12px; }
      label { line-height: 20px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>SN 한/영 자동 변환 테스트 페이지</h1>

    <section class="comparison-grid" aria-label="S/N 입력 비교">
      <div class="panel">
        <h2>기존 텍스트박스</h2>
        <form class="serial-form" autocomplete="off">
          <label for="Sno_001">구매 S/N</label>
          <input type="text" id="Sno_001" name="Sno_001">

          <label for="SnoChange_001">교체 S/N</label>
          <input type="text" id="SnoChange_001" name="SnoChange_001">
        </form>
        <div class="result-line" id="legacyResult">영문/숫자 외 입력은 삭제됩니다.</div>
      </div>

      <div class="panel">
        <h2>한/영 자동 변환(대문자)</h2>
        <form class="serial-form" autocomplete="off">
          <label for="ConvertSno_001">구매 S/N</label>
          <input type="text" id="ConvertSno_001" name="ConvertSno_001" autofocus>

          <label for="ConvertSnoChange_001">교체 S/N</label>
          <input type="text" id="ConvertSnoChange_001" name="ConvertSnoChange_001">
        </form>
        <div class="result-line" id="convertedResult">한글 입력 상태로 스캔된 S/N을 영문으로 변환하고 대문자로 정리합니다.</div>
      </div>
    </section>

    <section class="panel" aria-label="바코드 테스트">
      <h2>샘플 바코드</h2>
      <div class="barcode-layout">
        <div class="barcode-box">
          <img class="barcode-image" src="sample-sn-barcode.png" alt="샘플 S/N 바코드 M841Y6M700732">
        </div>
        <div class="barcode-box">
          <img class="photo-barcode" src="sample-sn-label.png" alt="CPU S/N 라벨 예시">
        </div>
      </div>
    </section>

    <section class="panel" aria-label="현재 입력 상태">
      <h2>현재 입력 상태</h2>
      <div class="ime-status" id="imeStatus">대기 중</div>
    </section>
  </main>

  <script src="./sn-ime-auto-convert.js"></script>
  <script>
    // 비교용 기존 입력란의 동작만 데모에서 간단히 재현한다.
    function isKoreanImeInput(value) {
      return /[ㄱ-ㅎㅏ-ㅣ가-힣]/.test(value || '');
    }

    function updateImeStatus(input, isKorean) {
      var status = document.getElementById('imeStatus');
      status.className = 'ime-status ' + (isKorean ? 'korean' : 'english');
      status.textContent = input.name + ' : ' + (isKorean ? '한글 입력 상태' : '영문 입력 상태');
    }

    function normalizeLegacyInput(input) {
      var rawValue = input.value;
      var finalValue = rawValue.replace(/[^a-zA-Z0-9]/g, '');
      input.value = finalValue;
      document.getElementById('legacyResult').textContent = input.name + ': ' + (rawValue || '(빈 값)') + ' -> ' + (finalValue || '(빈 값)');
      updateImeStatus(input, isKoreanImeInput(rawValue));
    }

    document.querySelectorAll('#Sno_001, #SnoChange_001').forEach(function (input) {
      input.addEventListener('input', function () {
        normalizeLegacyInput(input);
      });
    });

    // 실제 운영 페이지에서는 이 호출만 S/N 입력란 selector에 맞춰 넣으면 된다.
    applySnImeAutoConvert('#ConvertSno_001, #ConvertSnoChange_001', {
      onChange: function (event) {
        document.getElementById('convertedResult').textContent = event.input.name + ': ' + (event.rawValue || '(빈 값)') + ' -> ' + (event.finalValue || '(빈 값)');
      },
      onStatus: function (event) {
        updateImeStatus(event.input, event.isKorean);
      }
    });
  </script>
</body>
</html>
